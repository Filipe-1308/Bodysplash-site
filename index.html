<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auracandy</title>  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}

    body {
      background: radial-gradient(circle at top, #ff4d6d, #8b0000);
      color: white;
      overflow-x: hidden;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .banner {
      height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      position: relative;
    }

    .banner h1 {
      font-size: 52px;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    .banner p {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 25px;
      padding: 14px 30px;
      background: linear-gradient(45deg, #fff, #ffd6dc);
      color: #8b0000;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255,255,255,0.6);
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.1);
      filter: blur(80px);
      border-radius: 50%;
      animation: float 6s infinite alternate ease-in-out;
    }

    .glow:nth-child(1) {top:10%; left:20%;}
    .glow:nth-child(2) {bottom:10%; right:20%;}

    @keyframes float {
      from {transform: translateY(0px);}
      to {transform: translateY(-30px);}
    }

    .produtos {
      padding: 50px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 25px;
      text-align: center;
      backdrop-filter: blur(15px);
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .card h3 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style></head>
<body><header>AURACANDY</header><section class="banner">
  <div class="glow"></div>
  <div class="glow"></div>  <h1>Sinta sua Aura</h1>
  <p>Doce, intensa e impossível de ignorar</p>
  <a href="https://wa.me/5551982992241" class="btn">Comprar Agora</a>
</section><section class="produtos">
  <div class="card">
    <img src="https://via.placeholder.com/300x350" alt="Produto">
    <h3>Cherry Aura</h3>
    <p>Doce e viciante</p>
  </div>  <div class="card">
    <img src="https://via.placeholder.com/300x350" alt="Produto">
    <h3>Rose Candy</h3>
    <p>Elegante e sedutora</p>
  </div>  <div class="card">
    <img src="https://via.placeholder.com/300x350" alt="Produto">
    <h3>Berry Fire</h3>
    <p>Intenso e marcante</p>
  </div>
</section><footer>
  <p>📱 WhatsApp: +55 51 98299-2241</p>
  <p>© 2026 Auracandy - Todos os direitos reservados</p>
</footer></body>
</html>
