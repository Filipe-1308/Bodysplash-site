<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auracandy</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(180deg,#1a0006,#7a001f);color:#fff}
header{text-align:center;padding:20px;font-weight:700;letter-spacing:4px}
.banner{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.banner h1{font-size:52px}
.banner p{opacity:.8;margin-top:10px}
.section-title{font-size:32px;text-align:center;margin:30px 0}
.produtos{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:25px;padding:40px}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;text-align:center;cursor:pointer}
.card img{width:100%;border-radius:15px}
.price{margin:10px 0;color:#ffd6dc}
.add-btn{padding:10px 20px;border:none;border-radius:20px;background:#fff;color:#7a001f;cursor:pointer}/* MODAL NOVO */ .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:none;align-items:center;justify-content:center} .modal-content{background:#111;border-radius:20px;padding:20px;width:90%;max-width:400px;animation:fade .3s} @keyframes fade{from{opacity:0;transform:scale(.8)}to{opacity:1}} .modal img{width:100%;border-radius:15px;margin-bottom:10px} .bar{height:10px;border-radius:10px;margin:5px 0}

.cart-icon{position:fixed;top:20px;right:20px;background:#000a;padding:10px 15px;border-radius:20px;cursor:pointer} .cart-box{position:fixed;top:70px;right:20px;width:280px;background:#111;padding:15px;border-radius:15px;display:none} .btn-finalizar{margin-top:10px;width:100%;padding:10px;border:none;border-radius:20px;background:#25D366;color:#fff}

.whatsapp{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center} .whatsapp img{width:30px} </style>

</head>
<body><header>AURACANDY</header><div class="cart-icon" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div class="cart-box" id="cartBox">
<h3>Carrinho</h3>
<div id="cartItems"></div>
<div id="total"></div>
<button class="btn-finalizar" onclick="checkout()">Finalizar</button>
</div><section class="banner">
<h1>Sinta sua Aura</h1>
<p>Doce. Intenso. Inesquecível.</p>
</section><h2 class="section-title">✨ Edição limitada ✨</h2>
<section class="produtos">
<div class="card" onclick="openModal('Cherry Aura','Explosão doce','Frutado, doce','8h','Noite','Quente')">
<img src="cuide_se_bem_colonia_body_splash_da_perfumaria_o_boticario_338_1_6dffd4441a92ac72742e33855bfb3d18.jpg">
<h3>Cherry Aura</h3>
</div>
</section><!-- MODAL TOP --><div class="modal" id="modal">
<div class="modal-content">
<img id="mImg">
<h2 id="mName"></h2>
<p id="mDesc"></p><h4>Notas</h4>
<div id="mNotes"></div><h4>Duração</h4>
<p id="mDuration"></p><h4>Melhor uso</h4>
<p id="mUse"></p><button onclick="addFromModal()">Adicionar ao carrinho</button> <button onclick="buyNow()">Comprar agora</button>

</div>
</div><a href="https://wa.me/556191081245" class="whatsapp">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a><script>
let cart=[];
let currentProduct={};

function openModal(name,desc,notes,duration,use,clima){
 document.getElementById('modal').style.display='flex';
 document.getElementById('mName').innerText=name;
 document.getElementById('mDesc').innerText=desc;
 document.getElementById('mNotes').innerText=notes;
 document.getElementById('mDuration').innerText=duration;
 document.getElementById('mUse').innerText=use+" / "+clima;
 document.getElementById('mImg').src='cuide_se_bem_colonia_body_splash_da_perfumaria_o_boticario_338_1_6dffd4441a92ac72742e33855bfb3d18.jpg';
 currentProduct={name,price:39.9};
}

function addFromModal(){cart.push(currentProduct);updateCart();}

function buyNow(){
 let msg=`Quero ${currentProduct.name}`;
 window.open(`https://wa.me/556191081245?text=${msg}`);
}

function updateCart(){
 document.getElementById('count').innerText=cart.length;
}

function toggleCart(){
 let box=document.getElementById('cartBox');
 box.style.display=box.style.display==='block'?'none':'block';
}

function checkout(){
 let msg='Quero comprar:%0A';
 cart.forEach(i=>msg+=`- ${i.name}%0A`);
 window.open(`https://wa.me/556191081245?text=${msg}`);
}

window.onclick=function(e){
 if(e.target.id==='modal') document.getElementById('modal').style.display='none';
}
</script></body>
</html>
