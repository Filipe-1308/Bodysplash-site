<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auracandy</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(180deg,#120004,#7a001f);color:#fff}

header{text-align:center;padding:20px;font-weight:700;letter-spacing:4px}

.cart{position:fixed;top:20px;right:20px;background:#000a;padding:10px 15px;border-radius:20px;z-index:1000}

.produtos{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:30px}

.card{background:#ffffff10;padding:20px;border-radius:20px;text-align:center;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.05)}

.price{margin:10px 0;font-weight:600}

.add-btn{padding:10px;border:none;border-radius:20px;background:#fff;color:#7a001f;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:none;align-items:center;justify-content:center;z-index:2000}
.modal.show{display:flex}

.modal-box{background:#111;padding:20px;border-radius:20px;width:85%;max-width:400px;text-align:center;animation:fade .3s}

.modal-box img{width:100%;border-radius:15px;margin-bottom:10px}

@keyframes fade{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.btn{margin-top:10px;padding:12px;width:100%;border:none;border-radius:25px;font-weight:600;cursor:pointer}
.buy{background:#25D366;color:#fff}

.total-box{margin-top:10px;font-size:14px}
</style></head>
<body><header>AURACANDY</header><div class="cart">🛒 <span id="count">0</span> | Total: R$ <span id="total">0.00</span></div><section class="produtos"><div class="card" onclick="openModal('Cherry Aura','Doce marcante e envolvente',39.9,'cherry.jpg')">
<img src="cherry.jpg">
<h3>Cherry Aura</h3>
<div class="price">R$ 39,90</div>
<button class="add-btn" onclick="event.stopPropagation();add('Cherry Aura',39.9)">Adicionar</button>
</div><div class="card" onclick="openModal('Rose Candy','Elegante e sedutora',44.9,'rose.jpg')">
<img src="rose.jpg">
<h3>Rose Candy</h3>
<div class="price">R$ 44,90</div>
<button class="add-btn" onclick="event.stopPropagation();add('Rose Candy',44.9)">Adicionar</button>
</div><div class="card" onclick="openModal('Berry Fire','Intenso e marcante',49.9,'berry.jpg')">
<img src="berry.jpg">
<h3>Berry Fire</h3>
<div class="price">R$ 49,90</div>
<button class="add-btn" onclick="event.stopPropagation();add('Berry Fire',49.9)">Adicionar</button>
</div></section><!-- MODAL --><div class="modal" id="modal">
<div class="modal-box">
<img id="modalImg">
<h2 id="title"></h2>
<p id="desc"></p>
<p id="price"></p>
<button class="btn" onclick="addCurrent()">Adicionar ao carrinho</button>
<button class="btn buy" onclick="buyNow()">Comprar agora</button>
<button class="btn" onclick="closeModal()">Fechar</button>
</div>
</div><script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let current = null;

function update(){
 let total = 0;
 cart.forEach(i=> total += i.price);
 document.getElementById('count').innerText = cart.length;
 document.getElementById('total').innerText = total.toFixed(2);
 localStorage.setItem('cart',JSON.stringify(cart));
}

function add(name,price){
 cart.push({name,price});
 update();
}

function openModal(n,d,p,img){
 current={name:n,price:p};
 document.getElementById('title').innerText=n;
 document.getElementById('desc').innerText=d;
 document.getElementById('price').innerText='R$ '+p;
 document.getElementById('modalImg').src=img;
 document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}

function addCurrent(){ if(current) add(current.name,current.price); }

function buyNow(){
 if(!current) return;
 let msg=`Quero comprar:%0A- ${current.name} R$ ${current.price}`;
 window.open(`https://wa.me/556191081245?text=${msg}`);
}

update();
</script></body>
</html>
